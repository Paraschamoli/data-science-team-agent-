id: data-science-v1
name: data-science
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  LLM-based data science supervisor that coordinates analysis planning and recommendations.
  Loads CSV datasets from URLs, inspects data structure, and generates analysis plans.

# Tags and Modes
tags:
  - data-science
  - data-analysis
  - analysis-planning
  - pandas
  - csv-loading

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Analyze this dataset: https://example.com/data.csv and provide insights"
  - "What should I do with this dataset: https://example.com/data.csv"
  - "Create an analysis plan for my CSV data"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "LLM-based supervisor coordination for data science planning"
    features:
      - "CSV loading from HTTP/HTTPS URLs via pandas"
      - "Dataset inspection (shape, columns, dtypes, missing values, sample data)"
      - "LLM-generated analysis plans and recommendations"
      - "Workflow planning for data science tasks"
    limitations: "Does not execute actual ML models or generate visualizations; provides plans and recommendations only"

  secondary_capability:
    supported: true
    description: "Data science guidance and conceptual analysis"
    features:
      - "Methodology explanations"
      - "Best practices recommendations"
      - "Workflow planning"
      - "Conceptual analysis when no dataset provided"

# Requirements
requirements:
  packages:
    - "pandas"
    - "requests"
    - "openai"
    - "python-dotenv"
    - "bindu"
  system:
    - "Internet access for URL data loading"
    - "Python 3.12+"
  min_memory_mb: 256
  external_services:
    - "OpenRouter API (required)"

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  max_concurrent_requests: 5
  memory_per_request_mb: 256
  timeout_seconds: 120
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - pandas.read_csv
  - requests.get
  - OpenAI API

# Rich Documentation
documentation:
  overview: |
    LLM-based supervisor agent that loads CSV datasets from URLs and generates
    comprehensive analysis plans. Uses OpenRouter API with configurable models
    (default: anthropic/claude-3.5-sonnet). Does not execute actual analysis,
    ML models, or visualizations - provides planning and recommendations only.

  use_cases:
    when_to_use:
      - "Planning data science workflows"
      - "Getting analysis recommendations for CSV datasets"
      - "Understanding dataset structure and characteristics"
      - "Generating step-by-step analysis plans"

    when_not_to_use:
      - "Executing actual ML model training"
      - "Generating actual visualizations or plots"
      - "Real-time data processing"
      - "Non-CSV data formats (JSON, Parquet, databases)"
      - "Local file analysis (URLs only)"

  input_structure: |
    JSON-RPC 2.0 message with user query in parts array.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [{"kind": "text", "text": "Analyze https://example.com/data.csv"}],
          "kind": "message",
          "messageId": "msg-001",
          "contextId": "ctx-001",
          "taskId": "task-001"
        },
        "skillId": "data-science-v1",
        "configuration": {"acceptedOutputModes": ["application/json"]}
      },
      "id": "req-001"
    }

  output_format: |
    Text response with dataset debug info and LLM-generated analysis plan.

    Format:
    📊 Data Science Team Analysis (Supervisor Coordinated)

    📊 Dataset Debug Info:
    - Request ID: [id]
    - Dataset Hash: [hash]
    - Shape: (rows, cols)
    - Columns: [list]
    - Sample Data: [first 3 rows]

    🔧 Analysis Results:
    [LLM-generated workflow plan, insights, and recommendations]

  error_handling:
    - "URL loading failures: Tries pandas.read_csv then requests.get fallback"
    - "Missing OPENROUTER_API_KEY: Raises MissingAPIKeyError"
    - "LLM failures: Falls back to simple analysis mode"
    - "Invalid URLs: Returns DatasetLoadError"
    - "No dataset URL: Provides conceptual analysis only"

  examples:
    - title: "CSV Dataset Analysis Request"
      input:
        parts:
          - kind: "text"
            text: "Analyze the dataset at https://raw.githubusercontent.com/mwaskom/seaborn-data/master/tips.csv"
      output:
        text: |
          📊 Data Science Team Analysis (Supervisor Coordinated)

          📊 Dataset Debug Info:
          - Request ID: 2465177073088
          - Dataset Hash: 15c375ad
          - Shape: (244, 7)
          - Columns: ['total_bill', 'tip', 'sex', 'smoker', 'day', 'time', 'size']
          - Sample Data: [first 3 rows shown]

          🔧 Analysis Results:
          1. DETAILED WORKFLOW PLAN:
          Phase 1: Data Preparation & Initial Analysis
          Phase 2: Exploratory Data Analysis (EDA)
          Phase 3: Feature Engineering & Modeling

          2. KEY INSIGHTS & RECOMMENDATIONS:
          [Dataset characteristics and recommended approaches]

          3. NEXT STEPS FOR DATA SCIENCE TEAM:
          [Agent assignments and timeline]

  best_practices:
    for_developers:
      - "Ensure OPENROUTER_API_KEY is set in environment"
      - "Use async/await for all operations"
      - "Handle URL loading failures gracefully"
      - "Monitor LLM token usage and costs"

    for_orchestrators:
      - "Route CSV analysis planning requests to this skill"
      - "Expect 10-30 second processing time"
      - "Chain with actual execution agents for implementation"
      - "This agent plans but does not execute analysis"
      - "Dataset must be accessible via HTTP/HTTPS URL"

  installation: |
    Install via uv package manager.

    Required environment variables:
    OPENROUTER_API_KEY=<your-key>
    MODEL_NAME=anthropic/claude-3.5-sonnet (optional, default shown)

    Run:
    uv run python -m data_science_team_agent

  versioning:
    - version: "1.0.0"
      date: "2024-03-09"
      changes: "Initial release with LLM-based supervisor coordination"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "data analysis"
    - "dataset"
    - "csv"
    - "analyze"
    - "exploratory"
    - "plan"
    - "workflow"

  specializations:
    - domain: "data-analysis-planning"
      confidence_boost: 0.3
    - domain: "csv-inspection"
      confidence_boost: 0.2

  anti_patterns:
    - "Execute actual ML models"
    - "Generate actual visualizations"
    - "Process local files"
    - "Real-time data streams"
    - "Non-CSV formats"
    - "Database connections"

  complexity_indicators:
    simple:
      - "explain data science concept"
      - "what is EDA"
      - "how to approach analysis"
    medium:
      - "analyze this CSV dataset"
      - "create analysis plan"
      - "inspect dataset structure"
    complex:
      - "comprehensive workflow for multiple datasets"
      - "detailed multi-phase analysis plan"
